<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Watch Video</title>
    <link rel="stylesheet" href="../../utils/common.css" />
  </head>
  <body>
    <!-- Toast container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Header -->
    <header>
      <h1>SkillSwap Player</h1>
      <nav>
        <a href="feed.html" class="btn">Home</a>
        <button id="logoutBtn" class="btn">Logout</button>
      </nav>
    </header>

    <main>
      <!-- Video Player -->
      <div id="videoContainer">
        <video
          id="videoPlayer"
          controls
          poster="../../Landing Page/public/illustrations/default-thumbnail.png"
        >
          <!-- ✅ Source will be set dynamically by play.js -->
          <source id="videoSource" src="" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <!-- Video Details -->
      <div id="videoDetails">
        <h2 id="videoTitle"></h2>
        <p id="videoDescription"></p>
        <p><strong>Creator:</strong> <span id="videoCreator"></span></p>
        <p><strong>Credits Spent:</strong> <span id="videoCost"></span></p>
      </div>
    </main>

    <!-- Script -->
    <script type="module" src="../src/js/play.js"></script>
  </body>
</html>
